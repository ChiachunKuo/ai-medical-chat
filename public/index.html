<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI醫療分流系統</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔐 醫療切結書 -->
<div id="modal">
  <div class="modal-box">
    <h2>醫療使用聲明</h2>

    <p>
      本系統僅提供健康資訊與初步分流建議，<br>
      不可取代專業醫師診斷與治療。<br><br>

      使用本系統即表示您了解並同意：<br>
      1. 本系統不提供醫療診斷<br>
      2. 緊急情況請立即就醫<br>
      3. 所有建議僅供參考<br>
    </p>

    <div class="modal-btns">
      <button onclick="agree()">同意並進入</button>
      <button onclick="decline()">不同意</button>
    </div>
  </div>
</div>

<div class="container">
  <h1>AI醫療分流系統</h1>

  <div id="chat"></div>

  <div id="loading">AI分析中...</div>

  <div class="input-box">
    <input id="input" placeholder="請描述您的症狀...">
    <button onclick="send()">送出</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
