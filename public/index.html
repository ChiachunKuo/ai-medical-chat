<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI醫療問診系統</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="modal">
  <div class="modal-box">
    <h2>醫療聲明</h2>
    <p>本系統僅供參考，不能取代醫師診斷</p>
    <button onclick="accept()">進入系統</button>
  </div>
</div>

<div class="container">
  <h1>AI醫療問診</h1>

  <div id="chat"></div>

  <div id="loading">AI思考中...</div>

  <div class="input-box">
    <input id="input" placeholder="請描述症狀"/>
    <button onclick="send()">送出</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
