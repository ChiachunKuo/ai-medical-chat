<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧醫療 AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <div id="left">
    <h2>🏥 智慧醫療 AI</h2>

    <div id="chat"></div>

    <div class="input-box">
      <input id="input" placeholder="輸入症狀...">
      <button onclick="send()">送出</button>
    </div>
  </div>

  <div id="right">

    <h3>📍 建議就醫</h3>
    <button onclick="openHospital()">附近醫院 / 診所</button>

    <h3>🧾 搜尋紀錄</h3>
    <button onclick="clearHistory()">清除紀錄</button>
    <div id="history"></div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
