<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME GUIDE AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🎮 粒子背景 -->
<canvas id="bg"></canvas>

<div class="layout">

  <div class="chat-area">
    <h2 class="title">🎮 GAME GUIDE AI</h2>

    <div id="chat"></div>

    <div class="input-box">
      <input id="input" placeholder="輸入遊戲名稱或問題...">
      <button onclick="send()">送出</button>
    </div>
  </div>

  <div class="side">
    <h3>🔥 熱門遊戲</h3>
    <div id="games"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
